databaseChangeLog:
  - changeSet:
      id: 001-create-hotels
      author: gpsolutions
      preConditions:
        onFail: HALT
        not:
          tableExists:
            tableName: hotels

      changes:
        - createTable:
            tableName: hotels
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: VARCHAR(1000)

              - column:
                  name: brand
                  type: VARCHAR(255)

              - column:
                  name: house_number
                  type: INT

              - column:
                  name: street
                  type: VARCHAR(255)

              - column:
                  name: city
                  type: VARCHAR(255)

              - column:
                  name: country
                  type: VARCHAR(255)

              - column:
                  name: post_code
                  type: VARCHAR(20)

              - column:
                  name: phone
                  type: VARCHAR(50)

              - column:
                  name: email
                  type: VARCHAR(255)

              - column:
                  name: check_in
                  type: VARCHAR(10)

              - column:
                  name: check_out
                  type: VARCHAR(10)