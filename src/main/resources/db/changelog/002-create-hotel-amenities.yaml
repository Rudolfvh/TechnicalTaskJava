databaseChangeLog:
  - changeSet:
      id: 002-create-hotel-amenities
      author: gpsolutions
      preConditions:
        onFail: HALT
        not:
          tableExists:
            tableName: hotel_amenities

      changes:
        - createTable:
            tableName: hotel_amenities
            columns:

              - column:
                  name: hotel_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: amenity
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: hotel_amenities
            columnNames: hotel_id, amenity
            constraintName: pk_hotel_amenities

        - addForeignKeyConstraint:
            baseTableName: hotel_amenities
            baseColumnNames: hotel_id
            constraintName: fk_hotel_amenities_hotel
            referencedTableName: hotels
            referencedColumnNames: id
            onDelete: CASCADE

        - createIndex:
            tableName: hotel_amenities
            indexName: idx_hotel_amenities_hotel_id
            columns:
              - column:
                  name: hotel_id