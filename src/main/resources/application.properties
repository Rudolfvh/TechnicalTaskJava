# ====== SERVER ======
server.port=8092

# ====== DATASOURCE ======
spring.datasource.url=jdbc:h2:mem:propertydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ====== HIBERNATE / JPA ======
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ====== H2 CONSOLE ======
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ====== LIQUIBASE ======
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog-master.yaml
logging.level.liquibase=DEBUG

# ====== APPLICATION ======
app.api.prefix=/property-view
app.histogram.allowed=brand,city,country,amenities

# ====== SWAGGER ======
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html